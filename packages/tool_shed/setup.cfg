[metadata]
author = Galaxy Project and Community
author_email = galaxy-committers@lists.galaxyproject.org
description = Galaxy Tool Shed
license = MIT
license_files =
    LICENSE
long_description = file: README.rst, HISTORY.rst
long_description_content_type = text/x-rst
name = galaxy-tool-shed
url = https://github.com/galaxyproject/galaxy
version = 26.1.dev0

[options]
include_package_data = True
install_requires =
    galaxy-app
    galaxy-auth
    galaxy-config
    galaxy-data
    galaxy-util[image-util]
    galaxy-web-framework
    galaxy-web-stack
    galaxy-web-apps
    a2wsgi
    alembic
    fastapi>=0.133.0
    Mako
    MarkupSafe
    mercurial>=7.2
    Paste
    pydantic>=2.7.4
    Routes
    SQLAlchemy>=2.0.37,<2.1,!=2.0.41
    slowapi
    starlette>=1.0.1
    starlette-context
    typing-extensions
    WebOb
    Whoosh
package_dir =
    =src
packages = find:
python_requires = >=3.10

[options.extras_require]
test =
    galaxy-test-base
    galaxy-test-driver
    playwright
    pytest
    pytest-playwright

[options.packages.find]
where = src
exclude =
    tool_shed.test*
