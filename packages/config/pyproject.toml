[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools"]

[project]
dynamic = [
    "authors",
    "dependencies",
    "description",
    "license",
    "optional-dependencies",
    "readme",
    "requires-python",
    "version",
]
name = "galaxy-config"

[project.scripts]
galaxy-config = "galaxy.config.script:main"
