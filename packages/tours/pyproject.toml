[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools", "setuptools-scm>=8"]

[project]
dynamic = [
    "authors",
    "classifiers",
    "dependencies",
    "description",
    "keywords",
    "license",
    "optional-dependencies",
    "readme",
    "requires-python",
    "version",
]
name = "galaxy-tours"

[project.scripts]
gx-validate-tours = "galaxy.tours.validate:main"
