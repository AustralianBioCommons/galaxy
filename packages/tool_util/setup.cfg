[metadata]
author = Galaxy Project and Community
author_email = galaxy-committers@lists.galaxyproject.org
classifiers =
    Development Status :: 5 - Production/Stable
    Environment :: Console
    Intended Audience :: Developers
    Natural Language :: English
    Operating System :: POSIX
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.8
    Programming Language :: Python :: 3.9
    Programming Language :: Python :: 3.10
    Programming Language :: Python :: 3.11
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Programming Language :: Python :: 3.14
    Topic :: Software Development
    Topic :: Software Development :: Code Generators
    Topic :: Software Development :: Testing
description = Galaxy tool and tool dependency utilities
keywords =
    Galaxy
license = MIT
license_files =
    LICENSE
long_description = file: README.rst, HISTORY.rst
long_description_content_type = text/x-rst
name = galaxy-tool-util
url = https://github.com/galaxyproject/galaxy
version = 26.1.dev0

[options]
include_package_data = True
install_requires =
    galaxy-tool-util-models
    galaxy-util[template,image-util]>=22.1
    conda-package-streaming
    jsonschema
    lxml!=4.2.2
    MarkupSafe
    packaging
    pydantic>=2.7.4
    PyYAML
    requests
    sortedcontainers
    typing-extensions
package_dir =
    =src
packages = find_namespace:
python_requires = >=3.8

[options.extras_require]
cwl =
    cwl-utils
    cwltool>=3.1.20230624081518
mulled =
    jinja2
    Whoosh
edam =
    edam-ontology
extended-assertions =
    numpy
    pysam
    pillow
    tifffile
test =
    Beaker
    pytest
    pytest-mock
[options.packages.find]
where = src
