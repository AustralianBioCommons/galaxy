[metadata]
author = Galaxy Project and Community
author_email = galaxy-committers@lists.galaxyproject.org
description = Galaxy application (backend)
license = MIT
license_files =
    LICENSE
long_description = file: README.rst, HISTORY.rst
long_description_content_type = text/x-rst
name = galaxy-app
url = https://github.com/galaxyproject/galaxy
version = 26.0.2.dev0

[options]
include_package_data = True
install_requires =
    galaxy-auth
    galaxy-config
    galaxy-data
    galaxy-files
    galaxy-job-execution
    galaxy-job-metrics
    galaxy-objectstore
    galaxy-tool-util[cwl,edam]
    galaxy-tool-shed-schema
    galaxy-tours
    galaxy-util[image-util,jstree]
    galaxy-web-framework
    galaxy-web-stack
    Beaker
    boltons
    bx-python
    celery
    cloudauthz==0.6.0
    cwl-utils
    dparse
    gxformat2>=0.23.0
    kombu>=5.3
    lagom
    lxml!=4.2.2
    Mako
    Markdown
    MarkupSafe
    mercurial>=6.8.2
    more-itertools
    nodejs-wheel>=22,<23
    packaging
    paramiko!=2.9.0,!=2.9.1
    pebble
    pulsar-galaxy-lib>=0.15.0.dev0
    pydantic>=2.7.4
    pydantic-ai>=0.1.16
    pysam>=0.21
    python-slugify
    PyJWT
    PyYAML
    refgenconf>=0.12.0
    regex
    requests
    SQLAlchemy>=2.0.37,<2.1,!=2.0.41
    starlette
    svgwrite
    typing-extensions
    WebOb>=1.8.9
    Whoosh
packages = find:
python_requires = >=3.10

[options.extras_require]
test =
    galaxy-test-base
    mock-ssh-server
    pkce
    pykwalify
    pytest
    pytest-asyncio
    pytest-mock
    responses
    testfixtures

[options.packages.find]
exclude =
    galaxy.tools.bundled*
    tests*
