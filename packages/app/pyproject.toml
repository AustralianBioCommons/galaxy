[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools"]

[project]
dynamic = [
    "authors",
    "dependencies",
    "description",
    "license",
    "optional-dependencies",
    "readme",
    "requires-python",
    "version",
]
name = "galaxy-app"

[project.scripts]
galaxy-main = "galaxy.main:main"
galaxy-dependencies = "galaxy.dependencies.script:main"
