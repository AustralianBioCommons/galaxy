[metadata]
author = Galaxy Project and Community
author_email = galaxy-committers@lists.galaxyproject.org
description = Galaxy datatype framework and datatypes
license = MIT
license_files =
    LICENSE
long_description = file: README.rst, HISTORY.rst
long_description_content_type = text/x-rst
name = galaxy-data
url = https://github.com/galaxyproject/galaxy
version = 26.1.dev0

[options]
include_package_data = True
install_requires =
    galaxy-files
    galaxy-objectstore
    galaxy-schema
    galaxy-tool-util
    galaxy-util[image-util,template]
    alembic
    bdbag>=1.6.3
    bx-python
    dnspython
    galaxy-sequence-utils
    h5grove>=1.2.1
    h5py
    ijson
    isa-rwval>=0.10.11
    isal>=1.7.0
    MarkupSafe
    msal
    mrcfile
    numpy
    openpyxl>=3.1.5
    parsley
    pycryptodome
    pydantic[email]>=2.7.4
    pydicom
    pylibmagic
    pypng
    python-magic
    pysam>=0.21
    rocrate<0.15.0
    social-auth-core>=4.5.0
    SQLAlchemy>=2.0.37,<2.1,!=2.0.41
    tifffile
    typing-extensions
package_dir =
    =src
packages = find_namespace:
python_requires = >=3.10

[options.extras_require]
test =
    galaxy-config
    hvac
    pytest
    roc-validator

[options.packages.find]
where = src
exclude =
    galaxy.datatypes.test
