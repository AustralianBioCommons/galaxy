[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools"]

[project]
dynamic = [
    "authors",
    "dependencies",
    "description",
    "license",
    "optional-dependencies",
    "readme",
    "requires-python",
    "version",
]
name = "galaxy-web-client"

[project.scripts]
galaxy-web-client-install = "galaxy.web_client.install:main"
