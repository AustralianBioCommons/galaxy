[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools"]

[project]
dynamic = [
    "authors",
    "dependencies",
    "description",
    "license",
    "optional-dependencies",
    "readme",
    "requires-python",
    "version",
]
name = "galaxy-selenium"

[project.scripts]
gx-dump-tour = "galaxy.selenium.scripts.dump_tour:main"
