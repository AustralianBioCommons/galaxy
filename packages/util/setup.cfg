[metadata]
author = Galaxy Project and Community
author_email = galaxy-committers@lists.galaxyproject.org
description = Galaxy generic utilities
license = MIT
license_files =
    LICENSE
long_description = file: README.rst, HISTORY.rst
long_description_content_type = text/x-rst
name = galaxy-util
url = https://github.com/galaxyproject/galaxy
version = 26.0.2.dev0

[options]
include_package_data = True
install_requires =
    bleach
    boltons
    docutils!=0.17,!=0.17.1
    importlib-resources>=5.10.0;python_version<'3.12'
    packaging
    pyparsing>=3.0.0
    PyYAML
    requests
    typing-extensions
    zipstream-new
packages = find:
python_requires = >=3.8

[options.extras_require]
image-util =
    pillow
jstree =
    dictobj
template =
    CT3>=3.3.3
    fissix;python_version>='3.13'
    future>=1.0.0
config-template =
    galaxy-tool-util-models
    Jinja2
    pydantic>=2.7.4
test =
    pytest
    pytest-httpserver
    responses
    Werkzeug

[options.packages.find]
exclude =
    tests*
