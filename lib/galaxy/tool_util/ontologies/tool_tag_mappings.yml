# Curated tool → tag mapping (Galaxy "My Tools" panel and tool search).
#
# Each key is a tool id (full toolshed-style id, the short id, or any prefix
# of the toolshed-style id formed by stripping trailing path segments) and
# the value is a list of curated tag names. Tags surface in the tool panel's
# "tag:" autocompletion, in the favorite tags section of the My Tools view,
# and in the Whoosh `tool_tags` search field.
#
# This bundled file holds only the minimal set of entries needed by Galaxy's
# own integration tests. Production sites should override it via the
# `tool_tag_mappings_file` config option (galaxy.yml). A snapshot for the
# usegalaxy.eu instance — and a script to regenerate one for any Galaxy
# server — lives at scripts/extract_tool_sections_from_api.py.
tool_tags:
  __UNZIP_COLLECTION__:
    - collection_ops
    - dataset_collections
    - Collection Operations
  __ZIP_COLLECTION__:
    - collection_ops
    - dataset_collections
    - Collection Operations
  __FILTER_FAILED_DATASETS__:
    - collection_ops
    - dataset_collections
    - data_cleanup
    - data cleanup
    - Collection Operations
  __FILTER_EMPTY_DATASETS__:
    - collection_ops
    - dataset_collections
    - data_cleanup
    - data cleanup
    - Collection Operations
  liftOver1:
    - genome_coordinates
    - Convert Formats
