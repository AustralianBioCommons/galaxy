# Curated tool → tag mapping (Galaxy "My Tools" panel and tool search).
#
# Each key is a tool id (taken from the tool's XML `<tool id="…">` attribute,
# preserving its original case) or any prefix of a toolshed-style id formed
# by stripping trailing path segments. The value is a list of curated tag
# names. Tags surface in the tool panel's "tag:" autocompletion, in the
# favorite tags section of the My Tools view, and in the Whoosh `tool_tags`
# search field.
#
# This bundled mapping covers every tool shipped in `tool_conf.xml.sample`,
# tagged with the section name it lives under in the default tool panel.
# Production sites can extend or replace it via the `tool_tag_mappings_file`
# config option (galaxy.yml). A snapshot for any Galaxy server can be
# regenerated with `scripts/extract_tool_sections_from_api.py`.
#
# Lookup is case-insensitive — `Tool.all_ids` is lowercased at load time so
# admins don't need to worry about case in their override files.
